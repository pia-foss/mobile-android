name: Build Releases

on:
  pull_request:
    types: [ closed ]
    branches:
      - main

permissions:
  contents: read

jobs:
  gate:
    if: github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'version')
    runs-on: ubuntu-latest
    steps:
      - run: echo "Version branch merged, proceeding with builds"

  build-playstore-version:
    needs: gate
    uses: ./.github/workflows/build-playstore-android.yaml
    secrets: inherit

  build-website-version:
    needs: gate
    uses: ./.github/workflows/build-website-android.yaml
    secrets: inherit

  build-amazon-version:
    needs: gate
    uses: ./.github/workflows/build-amazon-android.yaml
    secrets: inherit

  build-meta-version:
    needs: gate
    uses: ./.github/workflows/build-meta-android.yaml
    secrets: inherit