name: Build Playstore Android
on: [workflow_call]
jobs:
  build:
    name: Generate App Bundle
    env:
      GITHUB_USERNAME: ${{ secrets.USERNAME_GITHUB }}
      GITHUB_TOKEN: ${{ secrets.TOKEN_GITHUB }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Gradle rights
        run: chmod +x gradlew

      - name: Bundle 'googleRelease' with Gradle
        run: ./gradlew bundleGoogleRelease

      - name: Decode keystore
        run: echo "${{ secrets.SIGNING_PLAYSTORE_KEYSTORE }}" | base64 -d > keystore.jks

      - name: Sign AAB
        id: sign_aab
        run: |
          jarsigner -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore keystore.jks \
            -storepass "${{ secrets.SIGNING_PLAYSTORE_STORE_PASSWORD }}" \
            -keypass "${{ secrets.SIGNING_PLAYSTORE_KEY_PASSWORD }}" \
            -signedjar app-google-release-signed.aab \
            app/build/outputs/bundle/googleRelease/app-google-release.aab \
            "${{ secrets.SIGNING_PLAYSTORE_KEY_ALIAS }}" 

      - run: echo "Build status report=${{ job.status }}."

      - name: Upload App Bundle
        uses: actions/upload-artifact@v6
        with:
          name: pia-output-google-play
          path: app-google-release-signed.aab
          if-no-files-found: error