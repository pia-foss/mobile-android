name: Build Release Candidate for testing

on:
  push:
    branches:
      - 'rc*'

permissions:
  contents: read

jobs:
  build:
    name: Build RC APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout RC branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge latest main
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git fetch origin main
          git merge origin/main --no-edit

      - name: Generate unique build ID
        id: build_id
        run: |
          BRANCH_SLUG=$(echo "${{ github.ref_name }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/-\+/-/g' \
            | sed 's/^-\|-$//g' \
            | cut -c1-40)

          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BUILD_ID="${BRANCH_SLUG}-${SHORT_SHA}"
          echo "build_id=${BUILD_ID}" >> $GITHUB_OUTPUT
          echo "Build ID: ${BUILD_ID}"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        env:
          GITHUB_USERNAME: ${{ secrets.GITHUB_USERNAME }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew assembleGoogleDebug --no-daemon

      - name: Rename APK with build ID
        run: |
          APK_PATH=$(find app/build/outputs/apk/google/debug -name "*.apk" | head -1)
          APK_DIR=$(dirname "$APK_PATH")
          mv "$APK_PATH" "${APK_DIR}/${{ steps.build_id.outputs.build_id }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build_id.outputs.build_id }}
          path: app/build/outputs/apk/google/debug/${{ steps.build_id.outputs.build_id }}.apk
          retention-days: 7

  build-playstore-version:
    uses: ./.github/workflows/build-playstore-android.yaml
    secrets: inherit

  build-website-version:
    uses: ./.github/workflows/build-website-android.yaml
    secrets: inherit

  build-amazon-version:
    uses: ./.github/workflows/build-amazon-android.yaml
    secrets: inherit

  build-meta-version:
    uses: ./.github/workflows/build-meta-android.yaml
    secrets: inherit