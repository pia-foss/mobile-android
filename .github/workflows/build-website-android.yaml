name: Build Website Android
on: [workflow_call]
jobs:
  build:
    name: Generate APK
    env:
      GITHUB_USERNAME: ${{ secrets.USERNAME_GITHUB }}
      GITHUB_TOKEN: ${{ secrets.TOKEN_GITHUB }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Gradle rights
        run: chmod +x gradlew

      - name: Assemble 'noinappRelease' with Gradle
        run: ./gradlew assembleNoinappRelease

      - name: Decode keystore
        run: echo "${{ secrets.SIGNING_WEB_KEYSTORE }}" | base64 -d > keystore.jks

      - name: Sign APK
        id: sign_apk
        run: |
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks keystore.jks \
            --ks-pass pass:"${{ secrets.SIGNING_WEB_STORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.SIGNING_WEB_KEY_PASSWORD }}" \
            --ks-key-alias "${{ secrets.SIGNING_WEB_KEY_ALIAS }}" \
            --out app-noinapp-release-signed.apk \
            app/build/outputs/apk/noinapp/release/app-noinapp-release-unsigned.apk

      - run: echo "Build status report=${{ job.status }}."

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: pia-output-website
          path: app-noinapp-release-signed.apk
          if-no-files-found: error