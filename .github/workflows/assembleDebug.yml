name: Build APKs

on:
  push:

jobs:
  ktlintCheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v5

      - name: Setup JAVA 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Run Ktlint Check
        run: ./gradlew ktlintCheck

  build-debug-apk:
    needs: ktlintCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v5

      - name: Setup JAVA 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Cache Gradle and wrapper
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Build Debug APK
        env:
          GITHUB_USERNAME: ${{ secrets.USERNAME_GITHUB }}
          GITHUB_TOKEN: ${{ secrets.TOKEN_GITHUB }}
        run: ./gradlew :app:assembleGoogleDebug

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/google/debug/*.apk
          retention-days: 1

  build-playstore-version:
    needs: ktlintCheck
    uses: ./.github/workflows/build-playstore-android.yaml
    secrets: inherit

  build-website-version:
    needs: ktlintCheck
    uses: ./.github/workflows/build-website-android.yaml
    secrets: inherit

  build-amazon-version:
    needs: ktlintCheck
    uses: ./.github/workflows/build-amazon-android.yaml
    secrets: inherit

  build-playstore-apk-version:
    needs: ktlintCheck
    uses: ./.github/workflows/build-playstore-apk-android.yaml
    secrets: inherit

  build-meta-version:
    needs: ktlintCheck
    uses: ./.github/workflows/build-meta-android.yaml
    secrets: inherit

  e2e-testing:
    name: Run end to end instrumentation tests
    needs: build-debug-apk
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v5

      - name: Setup JAVA 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Cache Gradle and wrapper
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/google/debug/

      - name: Enable Hardware Acceleration (Add KVM group perms)
        run: |
          sudo modprobe kvm
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run end to end instrumentation tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          GITHUB_USERNAME: ${{ secrets.USERNAME_GITHUB }}
          GITHUB_TOKEN: ${{ secrets.TOKEN_GITHUB }}
          PIA_VALID_USERNAME: ${{ secrets.PIA_VALID_USERNAME }}
          PIA_VALID_PASSWORD: ${{ secrets.PIA_VALID_PASSWORD }}
          PIA_VALID_DIP_TOKEN: ${{ secrets.PIA_VALID_DIP_TOKEN }}
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_4
          disk-size: 2G
          ram-size: 2048M
          emulator-boot-timeout: 480
          disable-animations: true
          disable-spellchecker: true
          script: |
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0
            ./gradlew :app:connectedGoogleDebugAndroidTest

      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: ${{ github.workspace }}/app/build/reports/androidTests/connected/debug/flavors/google/*
          overwrite: true