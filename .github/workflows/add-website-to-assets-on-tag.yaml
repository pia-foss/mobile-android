name: Add website build to release assets

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    name: Generate APK
    runs-on: ubuntu-latest

    env:
      GITHUB_USERNAME: ${{ secrets.USERNAME_GITHUB }}
      GITHUB_TOKEN: ${{ secrets.TOKEN_GITHUB }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Assemble 'noinappRelease' with Gradle
        run: ./gradlew assembleNoinappRelease

      - name: Extract version info
        id: version
        run: |
          VERSION_NAME=$(./gradlew -q printVersionName | tail -1)
          VERSION_CODE=$(./gradlew -q printNonPlayStoreVersionCode | tail -1)

          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT

      - name: Decode keystore
        run: |
          echo "${{ secrets.SIGNING_WEB_KEYSTORE }}" | base64 -d > keystore.jks

      - name: Sign APK
        run: |
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks keystore.jks \
            --ks-pass pass:"${{ secrets.SIGNING_WEB_STORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.SIGNING_WEB_KEY_PASSWORD }}" \
            --ks-key-alias "${{ secrets.SIGNING_WEB_KEY_ALIAS }}" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --out app-noinapp-release-signed.apk \
            app/build/outputs/apk/noinapp/release/app-noinapp-release-unsigned.apk

      - name: Rename APK
        run: |
          mv app-noinapp-release-signed.apk \
             pia-website-release-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.version_code }}.apk

      - name: Build status
        run: echo "Build status report=${{ job.status }}."

      - name: Create or Update GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }} ${{ steps.version.outputs.version_name }} (${{ steps.version.outputs.version_code }})" \
            --generate-notes \
            pia-website-release-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.version_code }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}