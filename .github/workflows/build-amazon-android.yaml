name: Build Amazon Android
on: [workflow_call]
jobs:
  build:
    name: Generate APK
    env:
      GITHUB_USERNAME: ${{ secrets.USERNAME_GITHUB }}
      GITHUB_TOKEN: ${{ secrets.TOKEN_GITHUB }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Gradle rights
        run: chmod +x gradlew

      - name: Assemble 'amazonRelease' with Gradle
        run: ./gradlew assembleAmazonRelease

      - name: Extract version info
        id: version
        run: |
          VERSION_NAME=$(./gradlew -q printVersionName | tail -1)
          VERSION_CODE=$(./gradlew -q printNonPlayStoreVersionCode | tail -1)
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT

      - name: Decode keystore
        run: echo "${{ secrets.SIGNING_WEB_KEYSTORE }}" | base64 -d > keystore.jks

      - name: Sign APK
        id: sign_apk
        run: |
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks keystore.jks \
            --ks-pass pass:"${{ secrets.SIGNING_WEB_STORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.SIGNING_WEB_KEY_PASSWORD }}" \
            --ks-key-alias "${{ secrets.SIGNING_WEB_KEY_ALIAS }}" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --out app-amazon-release-signed.apk \
            app/build/outputs/apk/amazon/release/app-amazon-release-unsigned.apk

      - run: echo "Build status report=${{ job.status }}."

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: pia-amazon-release-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.version_code }}
          path: app-amazon-release-signed.apk
          if-no-files-found: error